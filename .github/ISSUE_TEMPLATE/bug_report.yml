name: Bug report
description: Report a problem with public docs, schemas, examples, or workflows.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private data, or proprietary source code.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link to affected docs, schemas, examples, or workflow files.
    validations:
      required: false
