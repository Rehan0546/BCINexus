name: Feature request
description: Propose a public developer resource, example, schema, or integration guide.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - API
        - Schema
        - Example
        - SDK
        - Plugin
        - Hardware integration
        - GitHub repository infrastructure
    validations:
      required: true
